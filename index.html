<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1d29">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<title>Conecta 4 a 3 bandas</title>
<style>
  :root {
    --bg: #1a1d29;
    --panel: #242838;
    --board: #2e4a8f;
    --hole: #171a24;
    --text: #eef0f6;
    --muted: #9aa1b5;
    --p0: #e5484d;
    --p1: #f5c518;
    --p2: #46a758;
    --accent: #5b7fff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex; flex-direction: column; align-items: center;
    padding: 12px; gap: 10px;
    max-width: 560px; margin: 0 auto;
  }
  h1 { font-size: 1.15rem; font-weight: 700; text-align: center; }
  h1 small { display: block; font-size: .72rem; color: var(--muted); font-weight: 400; margin-top: 2px; }

  .players { display: flex; gap: 8px; width: 100%; }
  .player {
    flex: 1; background: var(--panel); border-radius: 10px; padding: 7px 6px;
    text-align: center; font-size: .8rem; border: 2px solid transparent;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
  }
  .player .dot { width: 13px; height: 13px; border-radius: 50%; flex: none; }
  .player.turn { border-color: var(--accent); box-shadow: 0 0 10px rgba(91,127,255,.35); }
  .player.me { text-decoration: underline; text-underline-offset: 3px; }

  #status {
    width: 100%; text-align: center; padding: 9px 12px; border-radius: 10px;
    background: var(--panel); font-size: .92rem; min-height: 40px;
    display: flex; align-items: center; justify-content: center;
  }
  #status.mine { background: #2d3a2e; color: #b7e6bd; font-weight: 600; }
  #status.win { background: #3a2d2d; color: #ffd9a8; font-weight: 700; }

  #board {
    background: var(--board); border-radius: 14px; padding: 6px;
    display: grid; grid-template-columns: repeat(9, 1fr); gap: 4px;
    width: 100%; touch-action: manipulation;
    box-shadow: 0 6px 18px rgba(0,0,0,.35);
  }
  .cell {
    aspect-ratio: 1; border-radius: 50%; background: var(--hole);
    position: relative; transition: background .15s;
  }
  .cell.c0 { background: var(--p0); } .cell.c1 { background: var(--p1); } .cell.c2 { background: var(--p2); }
  .cell.ghost0 { background: color-mix(in srgb, var(--p0) 40%, var(--hole)); }
  .cell.ghost1 { background: color-mix(in srgb, var(--p1) 40%, var(--hole)); }
  .cell.ghost2 { background: color-mix(in srgb, var(--p2) 40%, var(--hole)); }
  .cell.last::after {
    content: ""; position: absolute; inset: 28%; border-radius: 50%;
    background: rgba(255,255,255,.55);
  }
  .cell.winner { animation: pulse 1s infinite alternate; }
  @keyframes pulse { from { filter: brightness(1); } to { filter: brightness(1.7); } }

  .bar { display: flex; gap: 8px; width: 100%; }
  button {
    flex: 1; padding: 12px; border: none; border-radius: 10px;
    background: var(--panel); color: var(--text); font-size: .95rem; font-weight: 600;
    cursor: pointer;
  }
  button.primary { background: var(--accent); color: #fff; }
  button.danger { background: #7f2d33; }
  button:disabled { opacity: .45; }
  #confirmBar { display: none; }
  #confirmBar.show { display: flex; }

  #toast {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    background: #402a2d; color: #ffc9cc; padding: 10px 16px; border-radius: 10px;
    font-size: .88rem; opacity: 0; transition: opacity .25s; pointer-events: none;
    max-width: 90%; text-align: center; z-index: 10;
  }
  #toast.show { opacity: 1; }

  /* Pantallas de identidad y clave */
  #keyscreen input {
    width: 100%; max-width: 300px; padding: 14px; font-size: 1.05rem;
    border-radius: 10px; border: 1px solid #3a4055; background: var(--panel);
    color: var(--text); text-align: center;
  }
  #keyscreen, #identity {
    position: fixed; inset: 0; background: var(--bg); z-index: 20;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; padding: 24px;
  }
  #identity h2, #keyscreen h2 { font-size: 1.2rem; }
  #identity p, #keyscreen p { color: var(--muted); font-size: .85rem; text-align: center; }
  #identity button, #keyscreen button { width: 100%; max-width: 300px; padding: 16px; font-size: 1.05rem; flex: none; }
  .hidden { display: none !important; }

  .foot { font-size: .72rem; color: var(--muted); text-align: center; }
  .foot a { color: var(--muted); }
</style>
</head>
<body>

<div id="keyscreen" class="hidden">
  <h2>🔑 Clave del grupo</h2>
  <p id="keyMsg">Escríbela una vez y este móvil la recordará.<br>Si no la tienes, pídesela a quien montó el juego.</p>
  <input id="keyInput" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="clave del grupo">
  <button id="keyBtn" class="primary" style="background:var(--accent);color:#fff;">Entrar</button>
</div>

<div id="identity" class="hidden">
  <h2 id="idTitle">¿Quién eres?</h2>
  <p>Se guardará en este móvil para no volver a preguntar.</p>
  <div id="idButtons" style="display:flex;flex-direction:column;gap:10px;width:100%;align-items:center;"></div>
</div>

<h1 id="title">Conecta 4 a 3 bandas<small id="subtitle">cargando…</small></h1>
<div class="players" id="players"></div>
<div id="status">Conectando…</div>
<div id="board"></div>
<div class="bar" id="confirmBar">
  <button id="btnCancel">Cancelar</button>
  <button id="btnConfirm" class="primary">Confirmar jugada</button>
</div>
<div class="bar">
  <button id="btnRefresh">↻ Actualizar</button>
  <button id="btnNew" class="danger">Nueva partida</button>
</div>
<div class="foot"><span id="who"></span> · <a href="#" id="changeId">cambiar jugador</a></div>
<div id="toast"></div>

<script>
// ====== Configuracion (la hornea Claude desde config.json) ======
var CONFIG = {
  API_URL: 'https://script.google.com/macros/s/AKfycbxrhHKiv4MAONfAkgHYKclzSupuSuIZTtrxIZhZdOFL9yfyoGCDvUN9PsGJdb2J8MSNbg/exec',
  GAME_NAME: 'Conecta4 de los lamentables'
};

var COLS = 9, ROWS = 7;
var state = null;        // estado autoritativo del servidor
var me = localStorage.getItem('c4_who') || null;
var secret = localStorage.getItem('c4_secret') || null;
var pendingCol = null;   // columna seleccionada pendiente de confirmar
var busy = false;
var pollTimer = null;

var $ = function (id) { return document.getElementById(id); };

function toast(msg) {
  var t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._h);
  t._h = setTimeout(function () { t.classList.remove('show'); }, 3500);
}

function api(req) {
  req.secret = secret;
  // POST sin cabeceras personalizadas -> peticion "simple", sin preflight CORS
  return fetch(CONFIG.API_URL, { method: 'POST', body: JSON.stringify(req) })
    .then(function (r) { return r.json(); })
    .then(function (res) {
      if (res && res.error && res.error.indexOf('Secreto incorrecto') !== -1) {
        secret = null;
        localStorage.removeItem('c4_secret');
        showKey('Clave incorrecta. Vuelve a intentarlo.');
      }
      return res;
    });
}

// ---------- Clave del grupo ----------
function showKey(msg) {
  if (msg) $('keyMsg').innerHTML = '⚠️ ' + msg;
  $('identity').classList.add('hidden');
  $('keyscreen').classList.remove('hidden');
  setTimeout(function () { $('keyInput').focus(); }, 50);
}

function submitKey() {
  var v = $('keyInput').value.trim();
  if (!v) return;
  secret = v;
  localStorage.setItem('c4_secret', v);
  $('keyscreen').classList.add('hidden');
  $('keyInput').value = '';
  refresh().then(startPolling);
}

// ---------- Identidad ----------
function showIdentity(players) {
  var box = $('idButtons');
  box.innerHTML = '';
  players.forEach(function (p, i) {
    var b = document.createElement('button');
    b.textContent = p;
    b.style.background = 'var(--p' + i + ')';
    b.style.color = i === 1 ? '#333' : '#fff';
    b.onclick = function () {
      me = p;
      localStorage.setItem('c4_who', p);
      $('identity').classList.add('hidden');
      render();
    };
    box.appendChild(b);
  });
  $('identity').classList.remove('hidden');
}

// ---------- Render ----------
function dropRow(board, col) {
  for (var r = ROWS - 1; r >= 0; r--) if (board[r][col] === -1) return r;
  return -1;
}

function render() {
  if (!state) return;
  var myIdx = state.players.indexOf(me);

  $('subtitle').textContent = CONFIG.GAME_NAME;
  $('who').textContent = me ? ('Juegas como ' + me) : '';

  // Jugadores
  var ph = $('players');
  ph.innerHTML = '';
  state.players.forEach(function (p, i) {
    var d = document.createElement('div');
    d.className = 'player' + (state.winner === null && !state.draw && state.turn === i ? ' turn' : '') + (i === myIdx ? ' me' : '');
    d.innerHTML = '<span class="dot" style="background:var(--p' + i + ')"></span><span>' + p + '</span>';
    ph.appendChild(d);
  });

  // Estado
  var st = $('status');
  st.className = '';
  if (state.winner !== null) {
    st.classList.add('win');
    st.textContent = state.winner === myIdx ? '🏆 ¡Has ganado!' : '🏆 Ha ganado ' + state.players[state.winner];
  } else if (state.draw) {
    st.classList.add('win');
    st.textContent = 'Empate: tablero lleno.';
  } else if (state.turn === myIdx) {
    st.classList.add('mine');
    st.textContent = '✅ ¡Te toca! Toca una columna.';
  } else {
    st.textContent = 'Le toca a ' + state.players[state.turn] + '…';
  }

  // Tablero
  var bd = $('board');
  bd.innerHTML = '';
  var winSet = {};
  (state.winCells || []).forEach(function (rc) { winSet[rc[0] + ',' + rc[1]] = true; });
  var ghostRow = pendingCol !== null ? dropRow(state.board, pendingCol) : -1;

  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      var cell = document.createElement('div');
      var v = state.board[r][c];
      cell.className = 'cell' + (v !== -1 ? ' c' + v : '');
      if (winSet[r + ',' + c]) cell.className += ' winner';
      if (state.lastMove && state.lastMove.row === r && state.lastMove.col === c) cell.className += ' last';
      if (pendingCol === c && ghostRow === r && myIdx !== -1) cell.className += ' ghost' + myIdx;
      cell.dataset.col = c;
      bd.appendChild(cell);
    }
  }

  $('confirmBar').className = 'bar' + (pendingCol !== null ? ' show' : '');
}

// ---------- Acciones ----------
function refresh(silent) {
  return api({ action: 'get' }).then(function (res) {
    if (!res.ok) { if (!silent) toast(res.error); return; }
    if (!res.state) {
      // Aun no hay partida: creamos la primera
      return api({ action: 'new', by: me || 'alguien' }).then(function (r2) {
        if (r2.state) { state = r2.state; render(); ensureIdentity(); }
        else if (!silent) toast(r2.error);
      });
    }
    // Si cambio algo, repinta (y descarta seleccion pendiente si ya no es tu turno)
    var changed = !state || state.seq !== res.state.seq || state.updated !== res.state.updated;
    state = res.state;
    if (changed) {
      if (state.players.indexOf(me) !== state.turn) pendingCol = null;
      render();
    }
    ensureIdentity();
  }).catch(function () { if (!silent) toast('Sin conexión con el servidor. Reintenta.'); });
}

function ensureIdentity() {
  if (!state) return;
  if (me && state.players.indexOf(me) === -1) {
    // El nombre guardado ya no existe (p.ej. cambiaron los nombres): volver a preguntar
    me = null; localStorage.removeItem('c4_who');
  }
  if (!me) showIdentity(state.players);
}

function selectCol(c) {
  if (!state || busy) return;
  var myIdx = state.players.indexOf(me);
  if (state.winner !== null || state.draw) { toast('La partida ha terminado. Dale a "Nueva partida".'); return; }
  if (myIdx !== state.turn) { toast('No es tu turno: le toca a ' + state.players[state.turn] + '.'); return; }
  if (dropRow(state.board, c) === -1) { toast('Esa columna está llena.'); return; }
  pendingCol = (pendingCol === c) ? null : c;
  render();
}

function confirmMove() {
  if (pendingCol === null || busy) return;
  busy = true;
  $('btnConfirm').disabled = true;
  var col = pendingCol;
  api({ action: 'move', player: me, col: col }).then(function (res) {
    busy = false;
    $('btnConfirm').disabled = false;
    pendingCol = null;
    if (res.state) state = res.state;
    if (!res.ok) toast(res.error);
    render();
  }).catch(function () {
    busy = false;
    $('btnConfirm').disabled = false;
    toast('No se pudo enviar la jugada. Comprueba tu conexión.');
    refresh(true);
  });
}

function newGame() {
  var finished = state && (state.winner !== null || state.draw);
  if (!finished && !confirmNew.armed) {
    confirmNew.armed = true;
    $('btnNew').textContent = '¿Seguro? Se pierde la partida';
    setTimeout(function () { confirmNew.armed = false; $('btnNew').textContent = 'Nueva partida'; }, 4000);
    return;
  }
  confirmNew.armed = false;
  $('btnNew').textContent = 'Nueva partida';
  busy = true;
  api({ action: 'new', by: me, force: true }).then(function (res) {
    busy = false;
    if (res.ok) { state = res.state; pendingCol = null; render(); }
    else toast(res.error);
  }).catch(function () { busy = false; toast('No se pudo crear la partida.'); });
}
function confirmNew() {} // solo para colgar .armed

// ---------- Eventos ----------
$('board').addEventListener('click', function (ev) {
  var t = ev.target.closest('.cell');
  if (t) selectCol(parseInt(t.dataset.col, 10));
});
$('btnConfirm').onclick = confirmMove;
$('btnCancel').onclick = function () { pendingCol = null; render(); };
$('btnRefresh').onclick = function () { $('btnRefresh').textContent = '↻ …'; refresh().then(function () { $('btnRefresh').textContent = '↻ Actualizar'; }); };
$('btnNew').onclick = newGame;
$('changeId').onclick = function (e) { e.preventDefault(); if (state) showIdentity(state.players); };
$('keyBtn').onclick = submitKey;
$('keyInput').addEventListener('keydown', function (e) { if (e.key === 'Enter') submitKey(); });

document.addEventListener('visibilitychange', function () {
  if (document.visibilityState === 'visible') refresh(true);
});

// ---------- Arranque ----------
function startPolling() {
  if (pollTimer) return;
  pollTimer = setInterval(function () {
    if (document.visibilityState === 'visible' && !busy && secret) refresh(true);
  }, 12000);
}

if (CONFIG.API_URL.indexOf('__') === 0) {
  $('status').textContent = '⚠️ Falta configurar la URL del Apps Script (config.json).';
} else if (!secret) {
  $('status').textContent = 'Introduce la clave del grupo.';
  showKey();
} else {
  refresh();
  startPolling();
}
</script>
</body>
</html>
